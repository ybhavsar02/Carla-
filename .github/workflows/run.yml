name: Run Script Every 2 Hours

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python scraper.py

      - name: Commit and push DB updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "ybhavsar02@gmail.com"
          git add data/fares.db
          git commit -m "Update fares db" || echo "No changes"
          git push
